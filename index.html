<script>
function buildCard(row) {
  const data = Object.fromEntries(row.map((v,i) => [headers[i], v]));
  const card = document.createElement("div");
  card.className = "item-card";

  let imgHTML = "";
  if (data["Image"] && /^https?:\/\//.test(data["Image"])) {
    imgHTML = `<img src="${data["Image"]}" alt="Image">`;
  } else {
    imgHTML = `<div style="width:180px;background:#ddd;"></div>`;
  }

  const day = data["Day"] || "";
  const journey = data["Date Journey"] || "";

  let content = `
    <div class="item-content">
      <div class="item-header">${day} – ${journey}</div>
      <div class="item-info"><strong>${data["Accommodation"] || ""}</strong></div>

      <div class="extra" style="display:none; margin-top:10px;">
  `;

  // Extra hidden details
  ["Distance To Cover","Notes","Address","Phone Number","Email"].forEach(field => {
    if (data[field]) {
      content += `<div class="item-info"><strong>${field}:</strong> ${data[field]}</div>`;
    }
  });

  // Buttons
  content += `<div class="btn-row">`;

  if (data["Strava Link"] && /^https?:\/\//.test(data["Strava Link"])) {
    content += `<a class="btn" href="${data["Strava Link"]}" target="_blank">Strava</a>`;
  }
  if (data["Website"] && /^https?:\/\//.test(data["Website"])) {
    content += `<a class="btn" href="${data["Website"]}" target="_blank">Website</a>`;
  }

  content += `</div></div></div>`;

  card.innerHTML = imgHTML + content;

  // 🔥 Toggle expand on click
  card.addEventListener("click", (e) => {
    // prevent button clicks from toggling
    if (e.target.tagName === "A") return;

    const extra = card.querySelector(".extra");
    extra.style.display = extra.style.display === "none" ? "block" : "none";
  });

  return card;
}
</script>
