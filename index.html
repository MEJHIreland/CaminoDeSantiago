<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camino Journey Overview</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
  h1 { text-align: center; margin-bottom: 20px; }
  input { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
  .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .card h2 { margin-top: 0; font-size: 18px; color: #333; }
  .card p { margin: 5px 0; font-size: 14px; color: #555; }
  .card a { color: #1a73e8; text-decoration: none; }
  .card img { max-width: 100%; border-radius: 5px; margin-top: 10px; }
</style>
</head>
<body>

<h1>Camino De Santiago Overview</h1>
<input type="text" id="search" placeholder="Search all fields...">
<div class="cards" id="cardsContainer"></div>

<script>
// Replace with your published CSV URL
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS56dwy6ZBkH0rUmmXURoFouGTAd6vgHt6HlDpag0EYvkEjM5KAc19SskDLIw5ofA2yIEyRzt9owVj1/pub?gid=0&single=true&output=csv";

let allCards = [];

// Simple CSV parser that handles commas inside quotes
function parseCSV(text) {
  const rows = [];
  const lines = text.split("\n");
  lines.forEach(line => {
    const values = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    rows.push(values ? values.map(v => v.replace(/^"|"$/g, "")) : []);
  });
  return rows;
}

// Check if a string is a URL
function isURL(str) {
  return str.startsWith("http://") || str.startsWith("https://");
}

// Render cards dynamically
function renderCards(rows, headers) {
  const container = document.getElementById("cardsContainer");
  container.innerHTML = "";

  const importantFields = ["Accommodation", "Date Journey", "Price", "Strava Link"];

  rows.forEach(row => {
    if (!row || row.length === 0) return;
    const card = document.createElement("div");
    card.className = "card";

    let html = "";

    // Show important fields first
    importantFields.forEach(field => {
      const index = headers.indexOf(field);
      if (index >= 0 && row[index] && row[index].trim() !== "") {
        const value = row[index].trim();
        if (isURL(value) && field.toLowerCase().includes("image")) {
          html += `<img src="${value}" alt="${field}">`;
        } else if (isURL(value)) {
          html += `<p><strong>${field}:</strong> <a href="${value}" target="_blank">${value}</a></p>`;
        } else {
          html += `<p><strong>${field}:</strong> ${value}</p>`;
        }
      }
    });

    // Show remaining fields
    headers.forEach((header, i) => {
      if (importantFields.includes(header)) return;
      const value = row[i] ? row[i].trim() : "";
      if (!value) return;

      if (isURL(value) && header.toLowerCase().includes("image")) {
        html += `<img src="${value}" alt="${header}">`;
      } else if (isURL(value)) {
        html += `<p><strong>${header}:</strong> <a href="${value}" target="_blank">${value}</a></p>`;
      } else {
        html += `<p><strong>${header}:</strong> ${value}</p>`;
      }
    });

    card.innerHTML = html;
    container.appendChild(card);
  });
}

// Fetch CSV and render
fetch(csvUrl)
  .then(r => r.text())
  .then(text => {
    const rows = parseCSV(text);
    const headers = rows[0];
    allCards = rows.slice(1).filter(r => r.length > 1);
    renderCards(allCards, headers);
  });

// Search functionality
document.getElementById("search").addEventListener("input", e => {
  const query = e.target.value.toLowerCase();
  const filtered = allCards.filter(row => row.join(" ").toLowerCase().includes(query));
  const headers = allCards[0] ? allCards[0].map((_,i) => i) : [];
  renderCards(filtered, filtered.length ? filtered[0].map((_,i)=>`Column${i+1}`) : []);
});
</script>

</body>
</html>
