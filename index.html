<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camino Travel Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background: #fafafa; margin: 0; padding: 20px; }
h1 { text-align: center; color: #333; margin-bottom: 20px; }
#search { width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ccc; font-size:16px; }
.list { display:flex; flex-direction:column; gap:18px; }
.item-card { display:flex; background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); overflow:hidden; }
.item-card img { 
  width:180px;          
  height:120px;         
  object-fit:cover;     
  flex-shrink:0;
  border-radius: 6px 0 0 6px;
}
.item-content { padding:15px; flex-grow:1; }
.item-header { font-size:18px; font-weight:bold; color:#222; cursor:pointer; padding:10px; background:#f5f5f5; border-radius:6px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; }
.item-header:hover { background:#eaeaea; }
.item-info { font-size:14px; color:#555; margin-bottom:6px; }
.extra { display:none; margin-top:10px; }
.btn-row { margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
.btn { padding:10px; flex:1; text-align:center; background:#1a73e8; color:white; text-decoration:none; border-radius:6px; font-size:14px; }
.btn:hover { background:#1558c1; }
.arrow { font-size:14px; transition: transform 0.2s; }
.arrow.open { transform: rotate(90deg); }
</style>
</head>
<body>

<h1>Camino Travel Dashboard</h1>
<input type="text" id="search" placeholder="Search for journey, accommodation, dates...">
<div class="list" id="dashboard">Loading...</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS56dwy6ZBkH0rUmmXURoFouGTAd6vgHt6HlDpag0EYvkEjM5KAc19SskDLIw5ofA2yIEyRzt9owVj1/pub?output=csv";

// Robust CSV parser keeping empty cells
function parseCSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const row = line.match(/(".*?"|[^",\n]+)(?=\s*,|\s*$)/g) || [];
    return row.map(cell => cell.replace(/^"|"$/g, "").trim());
  });
}

let allItems = [];
let headers = [];

function buildCard(row) {
  const data = {};
  headers.forEach((h,i) => { data[h] = row[i] || ""; });

  const date = data["Date"] || "Unknown Date";
  const journey = data["Journey"] || "Unknown Journey";
  const title = `${date} – ${journey}`;

  const card = document.createElement("div");
  card.className = "item-card";

  // Image
  let imgHTML = "";
  if (data["Image"] && /^https?:\/\//.test(data["Image"])) {
    imgHTML = `<img src="${data["Image"]}" alt="Image">`;
  } else {
    imgHTML = `<div style="width:180px;height:120px;background:#ddd;"></div>`;
  }

  // Header with arrow
  const headerHTML = `<div class="item-header toggle"><span>${title}</span><span class="arrow">&#9654;</span></div>`;

  // Extra details (skip Address column)
  let extraHTML = `<div class="extra">`;
  const fields = ["Accomodation","Distance To Cover","Distance so Far","Notes","Phone Number","Email","Website","Booking Number","Date Booked","Price","People Booked","Opening Hours","Money Out Of Account"];
  fields.forEach(f => { if(data[f]) extraHTML += `<div class="item-info"><strong>${f}:</strong> ${data[f]}</div>`; });

  // Buttons row
  extraHTML += `<div class="btn-row">`;
  if(data["Website"] && /^https?:\/\//.test(data["Website"])) {
    extraHTML += `<a class="btn" href="${data["Website"]}" target="_blank">Website</a>`;
  }

  // Map button from Address column
  if(data["Address"] && data["Address"].trim() !== "") {
    let mapsUrl = data["Address"];
    if(!/^https?:\/\//.test(mapsUrl)) {
      mapsUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(mapsUrl);
    }
    extraHTML += `<a class="btn" href="${mapsUrl}" target="_blank">Map</a>`;
  }

  extraHTML += `</div></div>`;

  card.innerHTML = imgHTML + '<div class="item-content">' + headerHTML + extraHTML + '</div>';

  // Toggle expand/collapse
  const toggle = card.querySelector(".toggle");
  const extra = card.querySelector(".extra");
  const arrow = card.querySelector(".arrow");
  toggle.addEventListener("click", ()=>{
    if(extra.style.display === "block") {
      extra.style.display = "none";
      arrow.classList.remove("open");
    } else {
      extra.style.display = "block";
      arrow.classList.add("open");
    }
  });

  return card;
}

function render(data) {
  const container = document.getElementById("dashboard");
  container.innerHTML = "";
  data.forEach(row => container.appendChild(buildCard(row)));
}

fetch(csvUrl)
  .then(r => r.text())
  .then(text=>{
    const rows = parseCSV(text);
    headers = rows[0].map(h=>h.trim());
    allItems = rows.slice(1).filter(r=>r.length>0);
    render(allItems);
  });

document.getElementById("search").addEventListener("input", e=>{
  const query = e.target.value.toLowerCase();
  const filtered = allItems.filter(row=>row.join(" ").toLowerCase().includes(query));
  render(filtered);
});
</script>

</body>
</html>
